services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: drivee
      POSTGRES_PASSWORD: drivee
      POSTGRES_DB: drivee
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Порт наружу не пробрасываем: БД доступна только сервисам внутри docker-сети
    # (backend ходит на db:5432). Для локального доступа добавьте проброс вручную.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drivee -d drivee"]
      interval: 3s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://drivee:drivee@db:5432/drivee
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:8000}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
